name: app_gestion
description: "Gestión de embutidoras, colmados y pequeños negocios alimenticios. Offline-first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado / DI
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Navegación
  go_router: ^16.0.0

  # Base de datos local (SQLite)
  drift: ^2.28.0
  drift_flutter: ^0.2.7

  # Modelos inmutables
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilidades
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5

  # Licencias (F3): backend Supabase + identidad del dispositivo + conectividad
  supabase_flutter: ^2.8.0
  device_info_plus: ^11.0.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.5.0
  riverpod_generator: ^3.0.0
  drift_dev: ^2.28.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # Lints adicionales
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true
