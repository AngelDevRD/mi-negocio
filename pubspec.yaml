name: app_gestion
description: "Gestión de embutidoras, colmados y pequeños negocios alimenticios. Offline-first."
publish_to: 'none'

version: 1.1.1+3

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado / DI
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Navegación
  go_router: ^16.0.0

  # Base de datos local (SQLite)
  drift: ^2.28.0
  drift_flutter: ^0.2.7

  # Modelos inmutables
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilidades
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5

  # Compras (F9): foto de factura
  image_picker: ^1.1.2

  # Análisis financiero (F15): gráficas
  fl_chart: ^1.0.0

  # Exportaciones (F16): Excel, PDF, CSV y compartir
  excel: ^4.0.6
  pdf: ^3.11.1
  printing: ^5.13.4
  csv: ^6.0.0
  share_plus: ^10.1.4

  # Licencias (F3): backend Supabase + identidad del dispositivo + conectividad
  supabase_flutter: ^2.8.0
  device_info_plus: ^11.0.0
  connectivity_plus: ^6.1.0

  # Autenticación local (F5): hash de contraseñas y sesión persistida
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4

  # Respaldo y restauración (F17): ZIP + JSON, selector de archivos y versión de app
  archive: ^3.6.1
  file_picker: ^11.0.2
  package_info_plus: ^9.0.1

  # Perfil y suscripciones (F18): alertas de vencimiento
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.5.0
  riverpod_generator: ^3.0.0
  drift_dev: ^2.28.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # Lints adicionales
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.0

  # Icono de la app
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FC721F"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
